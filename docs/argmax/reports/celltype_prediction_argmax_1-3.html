<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cell Type Prediction - Argmax (1-3)</title>
  <style>
    :root {
      --bg: #000000;
      --panel: #000000;
      --panel-2: #000000;
      --line: #242424;
      --ink: #edf2f7;
      --muted: #9aa6b2;
      --accent: #7dd3fc;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Helvetica, Arial, sans-serif;
      background: #000;
      color: var(--ink);
    }
    .container {
      max-width: 1720px;
      margin: 0 auto;
      padding: 12px 14px 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .title-row h1 {
      margin: 0;
    }
    .title-selector {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .title-selector label {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .title-selector select {
      min-width: 120px;
    }
    .card {
      background: #000;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: none;
    }
    .card h2 {
      margin: 0 0 8px;
      font-size: 16px;
    }
    .img-static {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--line);
      display: block;
      background: #000;
    }
    .comparison-layout {
      display: grid;
      grid-template-columns: minmax(400px, 0.84fr) minmax(0, 1.16fr);
      gap: 12px;
      align-items: start;
    }
    .marker-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .marker-column {
      min-width: 0;
    }
    .marker-tile, .prediction-panel, .side-panel {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      overflow: hidden;
      min-width: 0;
    }
    .marker-tile header, .prediction-panel header, .side-panel h3 {
      padding: 8px 10px;
      margin: 0;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .prediction-stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 0;
    }
    .prediction-panel {
      display: flex;
      flex-direction: column;
      background: var(--panel-2);
    }
    .side-panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: transparent;
      border: 0;
      border-radius: 0;
      overflow: visible;
    }
    .tile-frame, .prediction-frame {
      position: relative;
      overflow: hidden;
      background: #000;
      touch-action: none;
      min-height: 0;
    }
    .tile-frame {
      flex: 1;
    }
    .marker-tile .tile-frame {
      aspect-ratio: 1 / 1;
      min-height: 175px;
    }
    .prediction-panel .prediction-frame {
      flex: 0 0 auto;
      height: clamp(390px, 48vh, 560px);
    }
    .sync-image {
      position: absolute;
      top: 0;
      left: 0;
      max-width: none;
      max-height: none;
      user-select: none;
      -webkit-user-drag: none;
      transform-origin: 0 0;
    }
    .panel-controls {
      display: flex;
      gap: 8px;
      padding: 8px 10px 10px;
      border-top: 1px solid var(--line);
      background: #000;
      flex-wrap: wrap;
      align-items: center;
    }
    button, select {
      border: 1px solid #34414d;
      background: #000;
      color: var(--ink);
      border-radius: 10px;
      padding: 7px 9px;
      font-size: 12px;
    }
    button { cursor: pointer; }
    button:hover, select:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    select { width: 100%; }
    .control-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      align-items: start;
    }
    .selector-card, .legend-box {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #000;
      min-width: 0;
    }
    .selector-card {
      padding: 10px;
    }
    .legend-box {
      margin: 0;
      overflow: hidden;
      background: #000;
      min-height: 0;
      max-width: 220px;
    }
    .legend-box img { display: block; width: 100%; max-width: 220px; background: #000; }
    @media (max-width: 1380px) {
      .control-row {
        grid-template-columns: 1fr;
      }
      .comparison-layout {
        grid-template-columns: 1fr;
      }
      .marker-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }
    @media (max-width: 1080px) {
      .marker-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
    @media (max-width: 700px) {
      .marker-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <script>
    const predictionViews = {"all": {"label": "All Cell Types", "image": "/Users/jubayer/Desktop/tnhl_cts/outputs/argmax/images/html_report_assets-argmax-1-3/03_celltype_predictions_all.png"}, "b": {"label": "B", "image": "/Users/jubayer/Desktop/tnhl_cts/outputs/argmax/images/html_report_assets-argmax-1-3/03_celltype_b.png"}, "t": {"label": "T", "image": "/Users/jubayer/Desktop/tnhl_cts/outputs/argmax/images/html_report_assets-argmax-1-3/03_celltype_t.png"}, "dendritic": {"label": "Dendritic", "image": "/Users/jubayer/Desktop/tnhl_cts/outputs/argmax/images/html_report_assets-argmax-1-3/03_celltype_dendritic.png"}, "macro": {"label": "Macro", "image": "/Users/jubayer/Desktop/tnhl_cts/outputs/argmax/images/html_report_assets-argmax-1-3/03_celltype_macro.png"}, "stroma": {"label": "Stroma", "image": "/Users/jubayer/Desktop/tnhl_cts/outputs/argmax/images/html_report_assets-argmax-1-3/03_celltype_stroma.png"}, "lymphatic": {"label": "Lymphatic", "image": "/Users/jubayer/Desktop/tnhl_cts/outputs/argmax/images/html_report_assets-argmax-1-3/03_celltype_lymphatic.png"}, "vascular_cd31": {"label": "Vascular_CD31", "image": "/Users/jubayer/Desktop/tnhl_cts/outputs/argmax/images/html_report_assets-argmax-1-3/03_celltype_vascular_cd31.png"}, "vascular_cd34": {"label": "Vascular_CD34", "image": "/Users/jubayer/Desktop/tnhl_cts/outputs/argmax/images/html_report_assets-argmax-1-3/03_celltype_vascular_cd34.png"}, "nk_cd57": {"label": "NK_CD57", "image": "/Users/jubayer/Desktop/tnhl_cts/outputs/argmax/images/html_report_assets-argmax-1-3/03_celltype_nk_cd57.png"}, "plasma": {"label": "Plasma", "image": "/Users/jubayer/Desktop/tnhl_cts/outputs/argmax/images/html_report_assets-argmax-1-3/03_celltype_plasma.png"}};
    const syncFrames = Array.from(document.querySelectorAll('.sync-frame'));
    const frameEntries = syncFrames.map((frame) => ({ frame, img: frame.querySelector('.sync-image') }));
    const predictionSelect = document.getElementById('prediction-select');
    const predictionImage = document.getElementById('prediction-image');
    const predictionLegend = document.getElementById('prediction-legend');
    const reportSampleSelect = document.getElementById('report-sample-select');
    const reportSelectorMap = {"1-1": "celltype_prediction_argmax_1-1.html", "1-2": "celltype_prediction_argmax_1-2.html", "1-3": "celltype_prediction_argmax_1-3.html"};

    const viewState = { zoom: 1, minZoom: 0.6, maxZoom: 24, centerX: 0, centerY: 0 };
    let dragState = null;

    function getImageDimensions() {
      const iw = predictionImage.naturalWidth || predictionImage.clientWidth;
      const ih = predictionImage.naturalHeight || predictionImage.clientHeight;
      if (!iw || !ih) return null;
      return { iw, ih };
    }

    function getBaseFit(frame, dimensions = getImageDimensions()) {
      if (!dimensions) return null;
      const fw = frame.clientWidth;
      const fh = frame.clientHeight;
      if (!fw || !fh) return null;
      return {
        frameWidth: fw,
        frameHeight: fh,
        scale: Math.min(fw / dimensions.iw, fh / dimensions.ih),
      };
    }

    function applyTransform() {
      const dimensions = getImageDimensions();
      if (!dimensions) return;
      frameEntries.forEach(({ frame, img }) => {
        const fit = getBaseFit(frame, dimensions);
        if (!fit) return;
        const scale = fit.scale * viewState.zoom;
        const x = fit.frameWidth / 2 - viewState.centerX * scale;
        const y = fit.frameHeight / 2 - viewState.centerY * scale;
        img.style.width = `${dimensions.iw}px`;
        img.style.height = `${dimensions.ih}px`;
        img.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
      });
    }

    function resetView() {
      viewState.zoom = 1;
      const dimensions = getImageDimensions();
      if (!dimensions) {
        viewState.centerX = 0;
        viewState.centerY = 0;
        return;
      }
      viewState.centerX = dimensions.iw / 2;
      viewState.centerY = dimensions.ih / 2;
      applyTransform();
    }

    function zoomAround(clientX, clientY, factor, frame) {
      const dimensions = getImageDimensions();
      const fit = getBaseFit(frame, dimensions);
      if (!fit) return;
      const rect = frame.getBoundingClientRect();
      const localX = clientX - rect.left;
      const localY = clientY - rect.top;
      const scale = fit.scale * viewState.zoom;
      const nextZoom = Math.max(viewState.minZoom, Math.min(viewState.maxZoom, viewState.zoom * factor));
      const nextScale = fit.scale * nextZoom;
      const currentX = fit.frameWidth / 2 - viewState.centerX * scale;
      const currentY = fit.frameHeight / 2 - viewState.centerY * scale;
      const imageX = (localX - currentX) / scale;
      const imageY = (localY - currentY) / scale;
      viewState.centerX = imageX - (localX - fit.frameWidth / 2) / nextScale;
      viewState.centerY = imageY - (localY - fit.frameHeight / 2) / nextScale;
      viewState.zoom = nextZoom;
      applyTransform();
    }

    function setPredictionView(key) {
      const view = predictionViews[key] || predictionViews.all;
      const showLegend = key === 'all' || !Object.prototype.hasOwnProperty.call(predictionViews, key);
      predictionSelect.value = Object.prototype.hasOwnProperty.call(predictionViews, key) ? key : 'all';
      predictionImage.onload = () => resetView();
      predictionImage.src = view.image;
      predictionImage.alt = view.label;
      predictionLegend.style.visibility = showLegend ? 'visible' : 'hidden';
      if (showLegend) {
        predictionLegend.innerHTML = `<img src="/Users/jubayer/Desktop/tnhl_cts/outputs/argmax/images/html_report_assets-argmax-1-3/03_celltype_predictions_legend.png" alt="Cell Type Legend" />`;
      }
      if (predictionImage.complete) resetView();
    }

    syncFrames.forEach((frame) => {
      frame.addEventListener('wheel', (event) => {
        event.preventDefault();
        const factor = event.deltaY < 0 ? 1.1 : 0.9;
        zoomAround(event.clientX, event.clientY, factor, frame);
      }, { passive: false });

      frame.addEventListener('pointerdown', (event) => {
        dragState = {
          frame,
          pointerId: event.pointerId,
          lastX: event.clientX,
          lastY: event.clientY,
        };
        frame.setPointerCapture(event.pointerId);
      });
      frame.addEventListener('pointermove', (event) => {
        if (!dragState || dragState.pointerId !== event.pointerId) return;
        const dimensions = getImageDimensions();
        const fit = getBaseFit(frame, dimensions);
        if (!fit) return;
        const scale = fit.scale * viewState.zoom;
        if (!scale) return;
        const dx = event.clientX - dragState.lastX;
        const dy = event.clientY - dragState.lastY;
        viewState.centerX -= dx / scale;
        viewState.centerY -= dy / scale;
        dragState.lastX = event.clientX;
        dragState.lastY = event.clientY;
        applyTransform();
      });
      frame.addEventListener('pointerup', (event) => {
        if (dragState && dragState.pointerId === event.pointerId) dragState = null;
      });
      frame.addEventListener('pointercancel', (event) => {
        if (dragState && dragState.pointerId === event.pointerId) dragState = null;
      });
    });

    document.getElementById('zoom-in').addEventListener('click', () => {
      const frame = document.querySelector('.prediction-frame');
      const rect = frame.getBoundingClientRect();
      zoomAround(rect.left + rect.width / 2, rect.top + rect.height / 2, 1.15, frame);
    });
    document.getElementById('zoom-out').addEventListener('click', () => {
      const frame = document.querySelector('.prediction-frame');
      const rect = frame.getBoundingClientRect();
      zoomAround(rect.left + rect.width / 2, rect.top + rect.height / 2, 0.87, frame);
    });
    document.getElementById('reset-view').addEventListener('click', resetView);
    predictionSelect.addEventListener('change', (event) => setPredictionView(event.target.value));
    if (reportSampleSelect) {
      reportSampleSelect.addEventListener('change', (event) => {
        const selectedSampleId = event.target.value;
        const targetReport = reportSelectorMap[selectedSampleId];
        if (targetReport) {
          const targetUrl = new URL(targetReport, window.location.href);
          window.location.href = targetUrl.href;
        }
      });
    }
    window.addEventListener('pageshow', () => setPredictionView(predictionSelect.value || 'all'));
    window.addEventListener('resize', resetView);

    if (predictionImage.complete) resetView();
    else predictionImage.addEventListener('load', resetView, { once: true });
    setPredictionView('all');
  </script>
